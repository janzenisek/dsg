# Data Stream Generator Configuration
# ===================================

Id = "ressource1"
Description = "DataStreamGenerator configuration for simulated sensors on a plant"
Environment = "DEVELOPMENT" # DEVELOPMENT, PRODUCTION
Seed = -1 # >= 0 means fixed seed
Shuffle = false # shuffle order of series generation every iteration, otherwise use rank
Interval = 100 # check interval in ms
DateTimeFormat = "yyyy-MM-dd-HH-mm-ss-fff"
StartDateTime = "1000-01-01-00-00-00-000"
DecimalPrecision = 4
Duration = 500000 # 500 seconds
Type = "stream1" # stream1 = use single thread for computation of all series, stream2 = use 1 task per series defined below
BrokerHostName = "127.0.0.1" 
BrokerHostPort = 1883 # default MQTT ports: 1883 & 8883
Disclosure = true


# Series Configuration
# ===================================

[[ME]] # Mathematical Expression
Id = "s0"
Title = "s0"
Topic = "ressource1/raw/s0"
Rank = 0
Export = false
Delay = 100
Interval = 200
C = 15.0
Mean = 0.0
StdDev = 0.05
Arguments = ["i"] # i = continuous iterator variable (delay included)
Expression = "4 * ( sin(i/5.0) + sin(2*i/5.0)/2 + sin(5*i/5.0)/7 )"

[[ARMA]] # Auto Regressive Moving Average series
Id = "s1"
Title = "s1"
Topic = "ressource1/raw/s1"
Rank = 1
Export = true
Delay = 100
Interval = 200
P = [0.2, 0.05, 0.01]
Q = [0.02, 0.01]
C = 10.0
Mean = 0.0
StdDev = 0.3
        [[ARMA.X]]
        Id = "s0"
        P = [0.3, 0.5, 0.7]

[[ARMA]] # Auto Regressive Moving Average series
Id = "s2"
Title = "s2"
Topic = "ressource1/raw/s2"
Rank = 2
Export = true
Delay = 100
Interval = 200
P = [0.1, 0.05, 0.01]
Q = [0.02, 0.01]
C = 5.0
Mean = 0.0
StdDev = 0.3
        [[ARMA.X]]
        Id = "s0"
        P = [0.5, 0.25, 0.1]



[[ARMA]] # Auto Regressive Moving Average series
Id = "s3"
Title = "s3"
Topic = "ressource1/raw/s3"
Rank = 3
Export = true
Delay = 100
Interval = 200
P = [0.1, 0.05, 0.01]
Q = [0.02, 0.01]
C = 5.0
Mean = 0.0
StdDev = 0.2
    [[ARMA.Drivers]]
    Id = "s1"
    P = [0.5, 0.25, -0.15]


[[ME]] # Mathematical Expression
Id = "s4"
Title = "s4"
Topic = "ressource1/raw/s4"
Rank = 4
Export = true
Delay = 100
Interval = 200
C = 5.0
Mean = 0.0
StdDev = 0.2
Arguments = ["s2", "s3"] # i = continous iterator variable (inclusive delay)
Expression = "cos(s2*s3) - sin(s2/s3)"

[[ARMA]] # Auto Regressive Moving Average series
Id = "s5"
Title = "s5"
Topic = "ressource1/raw/s5"
Rank = 5
Export = true
Delay = 100
Interval = 200
P = [0.1, 0.05, 0.01]
Q = [0.02, 0.01]
C = 4.0
Mean = 0.0
StdDev = 0.1
    [[ARMA.Drivers]]
    Id = "s3"
    P = [0.1, 0.05, 0.01]
    [[ARMA.Drivers]]
    Id = "s4"
    P = [0.8, 0.2, 0.1]
    

[[ARMA]] # Auto Regressive Moving Average series
Id = "s6"
