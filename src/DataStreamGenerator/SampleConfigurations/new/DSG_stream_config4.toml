# Data Stream Generator Configuration
# ===================================

Id = "plantXYZ"
Description = "DataStreamGenerator configuration for simulated sensors on a plant"
Environment = "DEVELOPMENT" # DEVELOPMENT, PRODUCTION
Seed = -1 # >= 0 means fixed seed
Shuffle = false # shuffle order of series generation every iteration, otherwise use rank
Interval = 1000 # check interval in ms
DateTimeFormat = "yyyy-MM-dd-HH-mm-ss-fff"
StartDateTime = "1000-01-01-00-00-00-000"
DecimalPrecision = 4
Duration = 5000000 # 5000 seconds
Type = "stream1" # stream1 = use single thread for computation of all series, stream2 = use 1 task per series defined below
BrokerHostName = "127.0.0.1" # using standard MQTT ports 1883 & 8883
Disclosure = true



# Series Configuration
# ===================================

[[ME]] # Mathematical Expression
Id = "s1"
Export = false
Rank = 1
Delay = 100
Title = "s"
Interval = 500
C = 15.0
Mean = 0.0
StdDev = 0.05
Arguments = ["i"] # i = continous iterator variable (delay included)
Expression = "4 * ( sin(i/5.0) + sin(2*i/5.0)/2 + sin(5*i/5.0)/7 )"

[[ARMA]] # Auto Regressive Moving Average series
Id = "s2"
Rank = 2
Export = true
Delay = 100
Interval = 500
Topic = "raw/plantx/component1/s2"
Title = "s2"
P = [0.1, 0.05, 0.01]
Q = [0.02, 0.01]
C = 5.0
Mean = 0.0
StdDev = 0.2
OutlierRatio1s = 0.05
    [[ARMA.Drivers]]
    Id = "s1"
    P = [0.5, 0.35]

[[ARMA]] # Auto Regressive Moving Average series
Id = "s3"
Rank = 3
Export = true
Delay = 100
Interval = 500
Topic = "raw/plantx/component1/s3"
Title = "s3"
P = [0.1, 0.05, 0.01]
Q = [0.02, 0.01]
C = 5.0
Mean = 0.0
StdDev = 0.2
OutlierRatio2s = 0.05
    [[ARMA.Drivers]]
    Id = "s1"
    P = [0.5, 0.25, -0.15]


[[ME]] # Mathematical Expression
Id = "s4"
Export = true
Rank = 4
Delay = 100
Title = "s4"
Topic = "raw/plantx/component2/s4"
Interval = 500
C = 5.0
Mean = 0.0
StdDev = 0.2
Arguments = ["s2", "s3"] # i = continous iterator variable (inclusive delay)
Expression = "cos(s2*s3) - sin(s2/s3)"


